<html class="dark" lang="en">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>HN</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
            rel="stylesheet"
        />
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <script id="tailwind-config">
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: {
                            error: "#ba1a1a",
                            "on-surface-variant": "#5a4136",
                            "surface-container-low": "#f5f3f3",
                            "on-secondary-fixed": "#1b1c1c",
                            "primary-fixed-dim": "#ffb596",
                            "on-error": "#ffffff",
                            "inverse-primary": "#ffb596",
                            "on-secondary-fixed-variant": "#464747",
                            "on-tertiary-container": "#2e302b",
                            "on-background": "#1b1c1c",
                            "secondary-container": "#e3e2e2",
                            "inverse-on-surface": "#f2f0f0",
                            "surface-bright": "#faf9f9",
                            "on-tertiary-fixed-variant": "#464743",
                            "surface-tint": "#2B9720",
                            "on-tertiary": "#ffffff",
                            "error-container": "#ffdad6",
                            "surface-container": "#efeded",
                            "on-error-container": "#93000a",
                            "primary-fixed": "#ffdbcd",
                            "on-surface": "#1b1c1c",
                            "on-secondary-container": "#646464",
                            "on-primary-fixed-variant": "#7c2e00",
                            tertiary: "#5d5f5a",
                            "secondary-fixed": "#e3e2e2",
                            "tertiary-fixed-dim": "#c6c7c0",
                            "outline-variant": "#e3bfb1",
                            "tertiary-fixed": "#e3e3dc",
                            "on-tertiary-fixed": "#1a1c18",
                            secondary: "#5e5e5e",
                            primary: "#2B9720",
                            "inverse-surface": "#303031",
                            surface: "#faf9f9",
                            "on-primary-fixed": "#0a2608",
                            background: "#faf9f9",
                            "primary-container": "#2B9720",
                            "surface-container-lowest": "#ffffff",
                            "surface-variant": "#e3e2e2",
                            "on-primary": "#ffffff",
                            "secondary-fixed-dim": "#c7c6c6",
                            "on-primary-container": "#ffffff",
                            "surface-container-highest": "#e3e2e2",
                            "surface-container-high": "#e9e8e8",
                            "on-secondary": "#ffffff",
                            outline: "#8e7164",
                            "surface-dim": "#dbdad9",
                            "tertiary-container": "#969791",
                        },
                        borderRadius: {
                            DEFAULT: "0.125rem",
                            lg: "0.25rem",
                            xl: "0.5rem",
                            full: "0.75rem",
                        },
                        fontFamily: {
                            headline: ["Space Grotesk"],
                            body: ["Inter"],
                            label: ["Inter"],
                        },
                    },
                },
            };
        </script>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body
        class="bg-background dark:bg-on-background text-on-surface dark:text-inverse-on-surface font-body selection:bg-primary-container selection:text-on-primary-container"
    >
        <!-- TopNavBar -->
        <nav
            class="fixed top-0 w-full z-50 bg-[#faf9f9]/80 dark:bg-[#1b1c1c]/80 backdrop-blur-xl border-b border-outline-variant/10"
        >
            <div
                class="flex justify-between items-center px-6 py-3 max-w-4xl mx-auto"
            >
                <div class="flex items-center gap-8 uppercase">
                    <a
                        class="text-xl font-bold text-[#2B9720] tracking-tighter font-headline"
                        href="/"
                    >
                        HN
                    </a>
                    <div class="flex items-center gap-6">
                        <a
                            class="text-slate-600 dark:text-slate-400 font-bold tracking-tight text-xs hover:text-[#2B9720] font-headline transition-colors"
                            href="/?type=new"
                            data-type="new"
                            >new</a
                        >
                        <a
                            class="text-slate-600 dark:text-slate-400 font-bold tracking-tight text-xs hover:text-[#2B9720] font-headline transition-colors"
                            href="/?type=ask"
                            data-type="ask"
                            >ask</a
                        >
                        <a
                            class="text-slate-600 dark:text-slate-400 font-bold tracking-tight text-xs hover:text-[#2B9720] font-headline transition-colors"
                            href="/?type=show"
                            data-type="show"
                            >show</a
                        >
                        <a
                            class="text-slate-600 dark:text-slate-400 font-bold tracking-tight text-xs hover:text-[#2B9720] font-headline transition-colors"
                            href="/?type=jobs"
                            data-type="jobs"
                            >jobs</a
                        >
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <button
                        id="theme-toggle"
                        class="material-symbols-outlined text-secondary hover:text-primary transition-colors text-xl"
                    >
                        dark_mode
                    </button>
                </div>
            </div>
        </nav>
        <!-- Main Content Canvas -->
        <main class="pt-16 pb-4 px-6 max-w-4xl mx-auto min-h-screen">
            <!-- Feed Items -->
            <div id="feed-container" class="divide-y divide-outline-variant/10">
                <!-- Skeleton Loader -->
                <div id="feed-loader" class="space-y-4 pt-4">
                    <div class="animate-pulse flex items-start px-2 py-4">
                        <div
                            class="w-8 h-8 bg-surface-container-highest/50 rounded mr-4"
                        ></div>
                        <div class="flex-1 space-y-3">
                            <div
                                class="h-4 bg-surface-container-highest/50 rounded w-3/4"
                            ></div>
                            <div
                                class="h-3 bg-surface-container-highest/30 rounded w-1/2"
                            ></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="mt-8 text-center">
                <button
                    id="load-more-btn"
                    class="hidden inline-flex items-center justify-center px-6 py-2.5 bg-surface-container-high dark:bg-on-background/20 rounded-lg font-headline font-bold uppercase tracking-widest text-[10px] text-primary hover:bg-primary-container hover:text-on-primary disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-300"
                >
                    Load More
                </button>
            </div>
        </main>
        <!-- Footer -->
        <footer
            class="w-full py-4 mt-4 border-t border-outline-variant/5 text-center"
        >
            <div
                id="footer-vibe"
                class="font-inter text-[10px] text-slate-500 dark:text-slate-400 tracking-wider"
            >
                <!-- Randomly set by script.js -->
            </div>
        </footer>
        <script src="script.js"></script>
    </body>
</html>
